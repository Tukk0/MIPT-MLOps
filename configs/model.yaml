# Model configuration
model:
  name: lenet5
  layers:
    - name: conv1
      in_channels: 1
      out_channels: 32
      kernel_size: 3
      stride: 1
      padding: 1
    - name: conv2
      in_channels: 32
      out_channels: 64
      kernel_size: 3
      stride: 1
      padding: 1
    - name: fc1
      in_features: 3136
      out_features: 128
    - name: fc2
      in_features: 128
      out_features: 10
  dropout_prob: 0.5
  batch_norm: true
  num_classes: 10
